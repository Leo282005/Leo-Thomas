<h1> Formulaire d'inscripton </h1>


<table border="0" width="50%"> 
	<tr>      <td> <label>Nom: </label> </td>   <td> <input type="text" name="t1"> </td>       </tr>
	<tr>      <td> <label>Prénom: </label> </td>  <td> <input type="text" name="t2"> </td>       </tr>
	<tr>      <td> <label>Adresse mail: </label> </td>   <td> <input type="text" name="t3"> </td>       </tr>
	<tr>      <td> <label>Ville: </label> </td>   <td> <select>
	<option> Nice </option>
	<option> Paris </option>
	<option> Lille </option>
</select> </td>       </tr>
	<tr>      <td> <label>Civilité: </label>
</td>   <td> <input type="radio" name="r1"> Monsieur
<input type="radio" name="r2"> Madame </td>       </tr>
	<tr>      <td> <label>Hobbies: </label>

</td>   <td> <input type="checbox" name="c1"> Sport
<input type="checbox" name="c2"> Musique
<input type="checbox" name="c3"> Voyage </td>       </tr>
	<tr>      <td> <label>Adresse postale: </label>  </td>   <td> <textarea cols="30" rows="10"></textarea> </td>       </tr>
	<tr>      <td> <label>Date de naissance: </label> </td>   <td> <input type="date" name="d1"> </td>       </tr>
	<tr>      <td> <label>mot de passe</label> </td>   <td> <input type="password" name="p1"> </td>       </tr>
	<tr>      <td> <label>confirmer mot de passe</label> </td>   <td> <input type="password" name="p2"> </td>       </tr>
	<tr>      <td> <label>niveau universitaire</label> </td>   <td> <input type="number" name="n1"> </td>       </tr>
	

</table>
